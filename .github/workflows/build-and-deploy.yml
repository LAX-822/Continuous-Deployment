name: build and deploy

on:
  push:
    branches: [ prod ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Deploy to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.NODE_PROD_HOST }}
          username: ${{ secrets.NODE_SSH_USER_NAME }}
          port: ${{ secrets.NODE_SSH_PORT }}
          key: ${{ secrets.NODE_SSH_KEY }}
          source: "./dist/*"
          target: "/var/www/html"
          strip_components: 1